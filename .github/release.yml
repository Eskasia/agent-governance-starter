changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Docs
      labels:
        - docs
        - documentation
    - title: Maintenance
      labels:
        - maintenance
        - chore
        - ci
    - title: Other Changes
      labels:
        - "*"
